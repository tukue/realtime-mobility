name: CI

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:

jobs:
  build:
    name: Build and scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Build Docker image
        run: docker build -t realtime-mobility:${{ github.sha }} .

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.4
        with:
          version: v0.68.1
          cache: true

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.33.1
        continue-on-error: true
        with:
          scan-type: image
          image-ref: realtime-mobility:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          skip-setup-trivy: true
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

      - name: Trivy summary
        if: always()
        run: |
          if [ -f trivy-results.sarif ]; then
            echo "Trivy scan completed and report uploaded as an artifact." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Trivy report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set; skipping deploy trigger."
            exit 0
          fi

          curl -fsSL -X POST "${RENDER_DEPLOY_HOOK_URL}"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
